<!DOCTYPE html>
<html lang="ru" data-theme="minedeck">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0e1217" />
  <title>MineDeck — панель управления сервером</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="min-h-screen">
  <!-- ================= AUTH SCREEN ================= -->
  <div id="auth-screen" class="hidden min-h-screen flex flex-col items-center justify-center gap-4 p-6">
    <div class="card w-full max-w-md bg-base-100 border border-base-300 shadow-xl">
      <div class="card-body">
        <div class="flex items-center gap-3.5 mb-4">
          <img src="/favicon.svg" alt="" class="w-11 h-11 drop-shadow" />
          <div>
            <div class="text-xl font-extrabold tracking-tight">MineDeck</div>
            <div class="text-xs text-base-content/50">Панель управления Minecraft</div>
          </div>
        </div>

        <form id="login-form" class="hidden space-y-2">
          <h2 class="text-lg font-bold mb-1">Вход</h2>
          <label class="form-control w-full">
            <div class="label py-1"><span class="label-text font-medium">Имя пользователя</span></div>
            <input type="text" name="username" autocomplete="username" required class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label py-1"><span class="label-text font-medium">Пароль</span></div>
            <input type="password" name="password" autocomplete="current-password" required class="input input-bordered w-full" />
          </label>
          <div class="text-error text-sm min-h-5" id="login-error"></div>
          <button type="submit" class="btn btn-primary w-full">Войти</button>
        </form>

        <form id="setup-form" class="hidden space-y-2">
          <h2 class="text-lg font-bold">Создание администратора</h2>
          <p class="text-sm text-base-content/50 mb-1">Первый запуск. Придумайте логин и пароль для входа в панель.</p>
          <label class="form-control w-full">
            <div class="label py-1"><span class="label-text font-medium">Имя пользователя</span></div>
            <input type="text" name="username" autocomplete="username" minlength="3" required class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label py-1"><span class="label-text font-medium">Пароль</span></div>
            <input type="password" name="password" autocomplete="new-password" minlength="6" required class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label py-1"><span class="label-text font-medium">Повторите пароль</span></div>
            <input type="password" name="password2" autocomplete="new-password" minlength="6" required class="input input-bordered w-full" />
          </label>
          <div class="text-error text-sm min-h-5" id="setup-error"></div>
          <button type="submit" class="btn btn-primary w-full">Создать и войти</button>
        </form>
      </div>
    </div>
    <div class="text-xs text-base-content/40">MineDeck • лёгкая панель для одного сервера</div>
  </div>

  <!-- ================= APP SHELL ================= -->
  <div id="app-shell" class="hidden h-screen flex">
    <aside id="sidebar" class="w-60 shrink-0 bg-base-200/70 border-r border-base-300 flex flex-col p-3">
      <div class="flex items-center gap-2.5 px-2 py-3 font-extrabold text-lg tracking-tight">
        <img src="/favicon.svg" alt="" class="w-7 h-7" /> MineDeck
      </div>
      <nav class="flex flex-col gap-1 mt-1">
        <a href="#/dashboard" data-view="dashboard" class="nav-item"><span data-icon="dashboard"></span> Панель</a>
        <a href="#/files" data-view="files" class="nav-item"><span data-icon="folder"></span> Файлы</a>
        <a href="#/databases" data-view="databases" class="nav-item"><span data-icon="database"></span> Базы данных</a>
        <a href="#/backups" data-view="backups" class="nav-item"><span data-icon="archive"></span> Бэкапы</a>
        <a href="#/timers" data-view="timers" class="nav-item"><span data-icon="timer"></span> Таймеры</a>
        <a href="#/properties" data-view="properties" class="nav-item"><span data-icon="sliders"></span> server.properties</a>
        <a href="#/firewall" data-view="firewall" class="nav-item"><span data-icon="shield"></span> Фаервол</a>
        <a href="#/settings" data-view="settings" class="nav-item"><span data-icon="settings"></span> Настройки</a>
      </nav>
      <div class="mt-auto flex flex-col gap-3">
        <div id="sys-mini" class="text-[11px] text-base-content/40 px-2 leading-relaxed"></div>
        <button id="logout-btn" class="btn btn-ghost btn-sm w-full gap-2"><span data-icon="logout"></span> Выйти</button>
      </div>
    </aside>
    <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

    <div class="flex-1 flex flex-col overflow-hidden min-w-0">
      <header class="flex items-center justify-between gap-3 px-4 sm:px-6 py-3 border-b border-base-300 bg-base-200/40 backdrop-blur">
        <div class="flex items-center gap-3 min-w-0">
          <button id="sidebar-toggle" class="btn btn-ghost btn-sm btn-square lg:hidden"><span data-icon="menu"></span></button>
          <div class="badge badge-lg gap-2 h-9 border-base-300 bg-base-100" id="status-pill">
            <span class="status-dot" id="status-dot"></span><span id="status-text" class="font-semibold">—</span>
          </div>
          <div id="uptime-text" class="text-xs text-base-content/50 hidden sm:block"></div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-success btn-sm gap-1.5" id="btn-start"><span data-icon="play"></span> Запуск</button>
          <button class="btn btn-warning btn-sm gap-1.5" id="btn-restart"><span data-icon="restart"></span> Рестарт</button>
          <button class="btn btn-error btn-sm gap-1.5" id="btn-stop"><span data-icon="stop"></span> Стоп</button>
          <button class="btn btn-ghost btn-sm btn-square" id="btn-kill" title="Принудительно завершить"><span data-icon="zap"></span></button>
        </div>
      </header>

      <main class="p-4 sm:p-6 overflow-y-auto flex-1" id="content"></main>
    </div>
  </div>

  <!-- ================= TOASTS + MODAL ================= -->
  <div id="toasts" class="toast toast-end z-[200]"></div>
  <div id="modal-root"></div>

  <script src="/js/icons.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
